events {
    worker_connections 1024;
}

http {
    # Timeouts for long-running API calls (video generation etc.)
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    upstream api {
        server api:3001;
    }

    upstream web {
        server web:3000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name video.trao.ai;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name video.trao.ai;

        ssl_certificate /etc/letsencrypt/live/video.trao.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/video.trao.ai/privkey.pem;

        client_max_body_size 50m;

        # API requests → Express
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://api;
        }

        # Everything else → Next.js
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js websockets
        location /_next/webpack-hmr {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
